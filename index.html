<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XEN — Coming Soon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #09090b;
      color: #fafafa;
      padding: 2rem;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 480px;
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: #6366f1;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2.25rem, 7vw, 3.75rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    p {
      margin-top: 1.25rem;
      color: #71717a;
      font-size: 1.0625rem;
      line-height: 1.6;
    }

    .line {
      width: 48px;
      height: 2px;
      background: #6366f1;
      margin: 2rem auto 0;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="logo">XEN</div>
    <h1>Coming Soon</h1>
    <p>We're building something new.<br>Check back shortly.</p>
    <div class="line"></div>
  </div>
</body>
</html>
