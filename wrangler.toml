name = "velvet-api"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "velvet-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
# Set real secrets in Cloudflare Dashboard → Settings → Environment variables
# JWT_SECRET = "change-me"
# BOOTSTRAP_SECRET = "change-me-for-first-admin-setup"
